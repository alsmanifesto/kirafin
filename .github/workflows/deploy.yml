name: CI/CD – Payments API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: payments-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── 1. Lint & Unit Tests ──────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

      # DORA: track test results for change failure rate
      - name: Record test result (DORA)
        if: always()
        run: |
          echo "DORA_TEST_RESULT=${{ job.status }}" >> $GITHUB_ENV
          echo "DORA_COMMIT=${{ github.sha }}" >> $GITHUB_ENV
          echo "DORA_TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

  # ─── 2. Security Scan ─────────────────────────────────────────────────────
  security:
    name: Security Scan (SOC 2)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

  # ─── 3. Build & Push Docker Image ─────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4

      # DORA: record build start time for lead time calculation
      - name: Record build start (DORA lead time)
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build \
            -f api/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image-uri=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Record build end (DORA lead time)
        run: |
          BUILD_END=$(date +%s)
          LEAD_TIME=$((BUILD_END - BUILD_START))
          echo "DORA_LEAD_TIME_SECONDS=$LEAD_TIME" >> $GITHUB_ENV
          echo "Lead time (commit→image): ${LEAD_TIME}s"

  # ─── 4. Deploy via Terraform ──────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_image_tag: ${{ env.IMAGE_TAG }}
        run: terraform apply -auto-approve tfplan

      # DORA: record deployment timestamp
      - name: Record deployment (DORA)
        run: |
          echo "DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DEPLOYED_SHA=${{ github.sha }}"
          echo "DEPLOYED_BY=${{ github.actor }}"

  # ─── 5. Post-Deploy Smoke Tests ───────────────────────────────────────────
  smoke-test:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Get API URL from Terraform outputs
        id: api-url
        working-directory: terraform
        run: |
          terraform init -backend=false
          echo "url=$(terraform output -raw api_url 2>/dev/null || echo ${{ secrets.API_URL }})" >> $GITHUB_OUTPUT

      - name: Wait for service to be healthy
        run: |
          URL="${{ steps.api-url.outputs.url }}"
          echo "Waiting for $URL/health..."
          for i in {1..20}; do
            if curl -sf "$URL/health" > /dev/null; then
              echo "Service healthy"
              exit 0
            fi
            echo "Attempt $i/20 – waiting 15s..."
            sleep 15
          done
          echo "Service never became healthy!"
          exit 1

      - name: Run smoke tests
        env:
          API_URL: ${{ steps.api-url.outputs.url }}
        run: bash tests/post-deploy-smoke-test.sh

      # DORA: if smoke tests fail, flag for MTTR tracking
      - name: Flag deployment failure for MTTR (DORA)
        if: failure()
        run: |
          echo "DORA_FAILURE_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "DORA_FAILURE_SHA=${{ github.sha }}"
          # In production: post to PagerDuty / incident tracking system
